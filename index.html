            const level = state.levels[levelIdx];
            const pM = document.getElementById('playerM').value || "Joueur 1";
            const pF = document.getElementById('playerF').value || "Joueur 2";

                const lowerItem = item.toLowerCase();
                const match = state.checklist.find(c => lowerItem.includes(c.text.toLowerCase()));

            if (pool.length === 0) {
                state.usedItems = state.usedItems.filter(item => !basePool.includes(item));
                pool = basePool;
                showToast("Cycle recommencé !");
            }

            if (pool.length === 0) return showToast("Aucun défi disponible !");

            const rawItem = pool[Math.floor(Math.random() * pool.length)];
            state.usedItems.push(rawItem);
            if (state.usedItems.length > 500) state.usedItems.shift(); 

            const activeName = state.currentRoulettePlayer === 'M' ? pM : pF;
            const inactiveName = state.currentRoulettePlayer === 'M' ? pF : pM;
            
            const finalItem = rawItem

                .replace(/\$inactivePlayer/g, inactiveName)
                .replace(/\$M/g, pM)
                .replace(/\$F/g, pF);

            if (finalItem.startsWith(pM)) textColorClass = 'text-blue-600';
            else if (finalItem.startsWith(pF)) textColorClass = 'text-pink-600';

            document.getElementById('activePlayerLabel').textContent = `Au tour de ${activeName}`;
            
            state.currentRoulettePlayer = state.currentRoulettePlayer === 'M' ? 'F' : 'M';

                document.getElementById('timerDisplay').textContent = "LIBRE";
            } else {
                startTimer(level.duration);
            }

        function startTimer(seconds) {
            let remaining = seconds;
            const display = document.getElementById('timerDisplay');
            timer = setInterval(() => {
                remaining--;
                if (remaining < 0) { 
                    clearInterval(timer); 
                    if (state.isSoundEnabled) playAlarm();
                    showToast("Temps écoulé !"); 
                    display.textContent = "00:00";
                    return;

                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);

            try {

                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(vol, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };
                const now = audioCtx.currentTime;
                playNote(523.25, now, 0.6, 0.15);       
                playNote(659.25, now + 0.15, 0.6, 0.15);

            lucide.createIcons();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        async function saveToCloud() {
            if (db && auth?.currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'global', 'state'), { state, updatedAt: Date.now() });
                } catch (e) {}
            }
        }

        window.onload = async () => {
            renderUI();
            if (typeof __firebase_config === 'undefined' || !__firebase_config) {
                updateStatus("Mode Local Actif");
                return; 
            }
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                updateStatus("Connexion Cloud...");
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        updateStatus("Cloud Synchronisé");
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'global', 'state'), (snap) => {
                            if (snap.exists()) {
                                state = snap.data().state;
                                renderUI();
                            } else { saveToCloud(); }
                        }, (err) => console.error("Snapshot error", err));
                    }
                });
            } catch (err) {
                updateStatus("Mode Local (Erreur Cloud)");
            }
        };
    </script>
</body>
</html>
